name: Lint and Format

on: [pull_request, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          version: "0.9.26"

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --no-dev

      #- name: Format docstrings
      #  run: uvx --managed-python docformatter . --black --pre-summary-newline -r -s sphinx --wrap-summaries 72 --wrap-descriptions 72

      - name: Ruff lint
        run: uvx ruff check . --exit-non-zero-on-fix

      - name: Ruff format
        run: uvx ruff format . --check

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false

      - name: Install uv and set python version
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: uv sync --no-dev --locked --group typeChecking
      - name: Run mypy
        run: uv run mypy .
