name: Validate Project Files
# Lint and format config files, readme, etc

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - ".github/**"
      - "README.md"
  pull_request:
    paths:
      - "pyproject.toml"
      - ".github/**"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: setup-tombi
        uses: tombi-toml/setup-tombi@fa8fb98ef9af2d3b9da565edc15935d523bca7e9 # v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: "latest"

      - name: Validate TOML files
        run: tombi lint pyproject.toml

      - name: Format TOML files
        run: tombi format --check --diff pyproject.toml

      - name: markdownlint-cli2-action
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          config: ".markdownlint.yaml"
          globs: "**/*.md"
